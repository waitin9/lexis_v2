{% load static %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>註冊 — Lexis</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}"/>
</head>
<body>
<div class="auth-layout">
  <div class="auth-card">
    <div class="auth-brand">Le<span>x</span>is</div>
    <h1 class="auth-title">建立帳號</h1>
    <p class="auth-subtitle">開始你的英文單字學習</p>

    {% if messages %}
    {% for message in messages %}
    <div class="message message-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label class="form-label" for="{{ field.id_for_label }}">
          {% if field.name == 'username' %}帳號
          {% elif field.name == 'password1' %}密碼
          {% elif field.name == 'password2' %}確認密碼
          {% else %}{{ field.label }}{% endif %}
        </label>
        <input type="{% if 'password' in field.name %}password{% else %}text{% endif %}"
               name="{{ field.name }}" id="{{ field.id_for_label }}"
               class="form-control {% if field.errors %}error{% endif %}"
               placeholder="{% if field.name == 'username' %}Username{% elif field.name == 'password1' %}至少 8 個字元{% else %}再輸入一次密碼{% endif %}"
               autocomplete="{{ field.name }}" />
        {% if field.errors %}
        <div style="color:var(--red);font-size:0.78rem;margin-top:4px;">
          {% for error in field.errors %}{{ error }}{% endfor %}
        </div>
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
        建立帳號
      </button>
    </form>

    <hr class="divider" />
    <p style="text-align:center;font-size:0.875rem;color:var(--text-muted);">
      已有帳號？<a href="{% url 'accounts:login' %}">登入</a>
    </p>
  </div>
</div>
</body>
</html>
