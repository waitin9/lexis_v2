{% load static %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>登入 — Lexis</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}"/>
</head>
<body>
<div class="auth-layout">
  <div class="auth-card">
    <div class="auth-brand">Le<span>x</span>is</div>
    <h1 class="auth-title">歡迎回來</h1>
    <p class="auth-subtitle">登入繼續你的學習</p>

    {% if form.errors %}
    <div class="message message-error">帳號或密碼錯誤，請再試一次。</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_username">帳號</label>
        <input type="text" name="username" id="id_username" class="form-control"
               placeholder="Username" autocomplete="username" autofocus />
      </div>
      <div class="form-group">
        <label class="form-label" for="id_password">密碼</label>
        <input type="password" name="password" id="id_password" class="form-control"
               placeholder="••••••••" autocomplete="current-password" />
      </div>
      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
        登入
      </button>
    </form>

    <hr class="divider" />
    <p style="text-align:center;font-size:0.875rem;color:var(--text-muted);">
      還沒有帳號？<a href="{% url 'accounts:register' %}">立即註冊</a>
    </p>
  </div>
</div>
</body>
</html>
